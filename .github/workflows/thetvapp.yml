name: 📺 Update TheTVApp Playlist 📺

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:        # Manual trigger

# Fix: Grant write permissions explicitly to allow code pushing
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Python dependencies & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright urllib3
          playwright install firefox
          playwright install-deps

      - name: 🚀 Run scraping script
        run: python tv.py

      - name: 💾 Commit & force-push playlist changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only attempt tracking if file exists
          if [ -f TheTVApp.m3u ]; then
            git add TheTVApp.m3u
            git reset -- .github/workflows/ || true
            
            # Check if there are changes to commit
            if ! git diff --cached --quiet; then
              git commit -m "Update playlist $(date -u)"
              git push --force origin main
            else
              echo "No changes detected in the playlist file."
            fi
          else
            echo "Error: TheTVApp.m3u was not created."
            exit 1
          fi
          
