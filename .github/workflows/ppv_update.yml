name: 🔁 Force Update PPVLand Playlist

on:
  workflow_dispatch:         # 🔘 Manual trigger
  schedule:
    - cron: '0 * * * *'       # ⏰ Hourly refresh
  push:
    paths:
      - 'ppv_parser.py'

permissions:
  contents: write            # 🔐 Grants authorization to commit and push changes back

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies & Target Browser
        run: |
          python -m pip install --upgrade pip
          pip install playwright aiohttp
          
          # 🦊 Install ONLY Firefox and its required system Linux libraries to save time
          python -m playwright install firefox
          python -m playwright install-deps firefox

      - name: ⚙️ Run Scraper
        run: python ppv_parser.py

      - name: 💾 Commit & Push Playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only proceed with Git logic if the file was actually generated
          if [ -f PPVLand.m3u8 ]; then
            git add PPVLand.m3u8
            
            if ! git diff --cached --quiet; then
              git commit -m "🔁 Auto-refresh PPVLand playlist [$(date -u +'%Y-%m-%d %H:%M:%S') UTC]"
              
              # 🔄 Sync histories smoothly right before pushing
              git fetch origin main
              git merge origin/main -X theirs --allow-unrelated-histories -m "Merge remote branch changes"
              
              git push origin main
            else
              echo "🟡 No changes detected in playlist content. Skipping commit."
            fi
          else
            echo "❌ Error: PPVLand.m3u8 was not generated by the python script."
            exit 1
          fi
          
